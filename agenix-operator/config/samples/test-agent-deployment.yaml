apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-agent
  template:
    metadata:
      labels:
        app: weather-agent
    spec:
      serviceAccountName: weather-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: registry.access.redhat.com/ubi9-minimal:latest
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
