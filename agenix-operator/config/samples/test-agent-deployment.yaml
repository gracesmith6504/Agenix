apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-agent
  template:
    metadata:
      labels:
        app: weather-agent
    spec:
      containers:
        - name: agent
          image: busybox
          command: ["sleep", "infinity"]
